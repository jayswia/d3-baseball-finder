  #pw-box {

  }
  #pw-box h2 { font-size: 1.1rem; font-weight: 700; color: #1a2744; margin-bottom: 4px; }
  #pw-box p  { font-size: .82rem; color: #9aa5b4; margin-bottom: 20px; }
  #pw-input {
    width: 100%; padding: 10px 14px; font-size: 1rem;
    border: 2px solid #e4e8ed; border-radius: 8px; outline: none;
    text-align: center; letter-spacing: 2px;
    transition: border-color .2s;
  }
  #pw-input:focus { border-color: #1a2744; }
  #pw-input.shake {
    animation: shake .35s ease;
    border-color: #c8102e;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
  #pw-error { font-size: .78rem; color: #c8102e; margin-top: 8px; min-height: 1em; }

  :root {

    --gold: #f5a623; --gray-50: #f8f9fa; --gray-100: #f0f2f5;
    --gray-200: #e4e8ed; --gray-400: #9aa5b4; --gray-600: #4a5568;
    --gray-800: #1a202c; --green: #276749; --green-light: #e6f4ec;
    --blue-light: #ebf4ff; --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,.10); --shadow-sm: 0 2px 8px rgba(0,0,0,.07);

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-100); color: var(--gray-800); min-height: 100vh; }
  .header { background: var(--navy); color: #fff; padding: 20px 24px 18px; text-align: center; }
  .header h1 { font-size: 1.45rem; font-weight: 700; letter-spacing: -.3px; }
  .header p { font-size: .85rem; color: rgba(255,255,255,.65); margin-top: 4px; }
  .badge { display: inline-block; background: var(--red); color: #fff; font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; letter-spacing: .5px; margin-bottom: 8px; text-transform: uppercase; }
  .progress-bar { background: var(--navy-light); height: 4px; }
  .progress-fill { height: 100%; background: var(--gold); transition: width .35s ease; }
  .container { max-width: 640px; margin: 0 auto; padding: 20px 16px 40px; }
  .step-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 24px; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .step-label { font-size: .75rem; font-weight: 600; color: var(--red); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
  .step-question { font-size: 1.2rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; line-height: 1.35; }
  .step-hint { font-size: .82rem; color: var(--gray-400); margin-bottom: 20px; }
  .options { display: grid; gap: 10px; }
  .options.two-col { grid-template-columns: 1fr 1fr; }
  .option-btn { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: 10px; background: #fff; cursor: pointer; text-align: left; transition: all .15s ease; font-size: .93rem; font-weight: 500; color: var(--gray-800); width: 100%; }
  .option-btn:hover { border-color: var(--navy); background: var(--blue-light); }
  .option-btn.selected { border-color: var(--navy); background: var(--navy); color: #fff; }
  .option-btn .icon { font-size: 1.3rem; flex-shrink: 0; width: 28px; text-align: center; }
  .option-btn .label { flex: 1; }
  .option-btn .sublabel { font-size: .76rem; opacity: .65; margin-top: 1px; font-weight: 400; }
  .nav-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn { flex: 1; padding: 13px; border-radius: 10px; border: none; cursor: pointer; font-size: .95rem; font-weight: 600; transition: all .15s ease; }
  .btn-back { background: var(--gray-100); color: var(--gray-600); flex: 0 0 auto; width: 90px; }
  .btn-back:hover { background: var(--gray-200); }
  .btn-next { background: var(--navy); color: #fff; }
  .btn-next:hover { background: var(--navy-light); }
  .btn-next:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
  .results-header { text-align: center; margin-bottom: 20px; }
  .results-header h2 { font-size: 1.4rem; font-weight: 700; color: var(--navy); }
  .results-header p { font-size: .85rem; color: var(--gray-400); margin-top: 4px; }
  .school-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 14px; overflow: hidden; border: 2px solid transparent; }
  .school-card.top-match { border-color: var(--navy); }
  .top-banner { background: var(--navy); color: #fff; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; padding: 5px 18px; }
  .school-card-header { padding: 16px 18px 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .school-name { font-size: 1.05rem; font-weight: 700; color: var(--navy); }
  .school-meta { font-size: .78rem; color: var(--gray-400); margin-top: 3px; }
  .match-score { flex-shrink: 0; text-align: center; background: var(--navy); color: #fff; border-radius: 8px; padding: 6px 12px; min-width: 54px; }
  .top-match .match-score { background: var(--red); }
  .match-score .num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
  .match-score .lbl { font-size: .62rem; opacity: .7; text-transform: uppercase; letter-spacing: .5px; }
  .school-stats { border-top: 1px solid var(--gray-100); border-bottom: 1px solid var(--gray-100); }

  .stat-row + .stat-row { border-top: 1px solid var(--gray-100); background: var(--gray-50); }
  .stat-row-label { display: flex; align-items: center; justify-content: center; padding: 10px 8px; font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: #fff; background: var(--navy); border-right: 1px solid rgba(255,255,255,.15); text-align: center; line-height: 1.3; }
  .stat-row + .stat-row .stat-row-label { background: var(--navy-light); }
  .stat-cell { padding: 10px 12px; text-align: center; border-right: 1px solid var(--gray-100); }
  .stat-cell:last-child { border-right: none; }
  .stat-val { font-size: 1.05rem; font-weight: 700; color: var(--navy); }
  .stat-lbl { font-size: .68rem; color: var(--gray-400); text-transform: uppercase; letter-spacing: .4px; margin-top: 1px; }
  /* Collapsible details section */

  .card-details summary { list-style: none; padding: 9px 18px; font-size: .78rem; font-weight: 600; color: var(--gray-400); cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }

  .class-table td { padding: 5px 8px; text-align: center; border-bottom: 1px solid var(--gray-100); color: var(--gray-800); }

  .class-pending { padding: 8px 18px 12px; font-size: .78rem; color: var(--gray-400); font-style: italic; }
  .header-disclaimer { font-size: .75rem; color: rgba(255,255,255,.45); margin-top: 6px; line-height: 1.5; }

    .option-btn { min-height: 54px; padding: 12px 14px; font-size: .9rem; }
    .btn { min-height: 48px; font-size: .92rem; }
    .btn-back { width: 76px; }
    .header h1 { font-size: 1.25rem; }
    .header p { font-size: .8rem; }
    .school-card-header { padding: 13px 14px 10px; gap: 8px; }
    .school-name { font-size: .97rem; }
    .school-meta { font-size: .74rem; }
    .match-score { min-width: 46px; padding: 5px 9px; }
    .match-score .num { font-size: 1.25rem; }
    .stat-row { grid-template-columns: 52px 1fr 1fr 1fr; }
    .stat-row-label { font-size: .55rem; padding: 8px 4px; }
    .stat-cell { padding: 8px 6px; }
    .stat-val { font-size: .95rem; }
    .stat-lbl { font-size: .63rem; }
    .fit-section { padding: 9px 14px 10px; }
    .fit-text { font-size: .8rem; }
    .card-details summary { padding: 9px 14px; font-size: .76rem; }
    .size-row { padding: 6px 14px 10px; font-size: .75rem; }
    .school-tags { padding: 10px 14px; gap: 5px; }
    .tag { font-size: .67rem; padding: 3px 8px; }
    .depth-row { padding: 0 14px 4px; }
    .depth-note { padding: 2px 14px 10px; }
    .acad-grid { padding: 8px 14px 2px; }
    .acad-fit { padding: 4px 14px 10px; font-size: .77rem; }
    .coach-row { padding: 9px 14px 10px; }
    .school-footer { padding: 9px 14px 12px; }
    .roster-link { font-size: .78rem; }
    .drive-badge { font-size: .72rem; }
    .action-row { flex-direction: column; gap: 8px; }
    .btn-restart, .btn-share { width: 100%; padding: 13px 22px; }
    .results-header h2 { font-size: 1.2rem; }
  }
</style>

<div id="pw-overlay">
  <div id="pw-box">
    <h2>D3 Baseball Finder</h2>
    <p>Enter password to continue</p>
    <input id="pw-input" type="password" placeholder="Password" autocomplete="off" />
    <div id="pw-error"></div>
  </div>
</div>

<script>
(function(){
  var input = document.getElementById('pw-input');
  var error = document.getElementById('pw-error');
  var overlay = document.getElementById('pw-overlay');
  function check() {
    if (input.value === 'elite8') {
      overlay.style.display = 'none';
    } else {
      error.textContent = 'Incorrect password.';
      input.classList.remove('shake');
      void input.offsetWidth; // reflow to restart animation
      input.classList.add('shake');
      input.value = '';
      setTimeout(function(){ error.textContent = ''; }, 1500);
    }
  }
  input.addEventListener('keydown', function(e){ if (e.key === 'Enter') check(); });
  document.addEventListener('DOMContentLoaded', function(){ input.focus(); });
})();
</script>

// ── MATCHING ─────────────────────────────────────────────────────
function buildTags(a) {
  var t = {};
  function add(tag){ t[tag] = true; }

  // Position depth tags (crowded-catcher excluded from scoring — shown as caution on cards only)
  var posMap = {
    C:  ["catcher-opportunity"],
    CI: ["corner-inf-opportunity","crowded-corner-inf"],
    MI: ["middle-inf-opportunity","crowded-middle-inf"],
    OF: ["outfield-opportunity","crowded-outfield"],
    UTL:["small-roster-high-opportunity"]
  };
  var posTags = posMap[a.position] || [];
  for (var i=0; i<posTags.length; i++) add(posTags[i]);

  // Style tags
  var s = a.style || "";
  // Pitcher styles — handedness
  if (s.indexOf("lhp_") === 0) { add("lhp-heavy-staff"); add("balanced-pitching-mix"); }
  if (s.indexOf("rhp_") === 0) { add("rhp-dominant-staff"); add("balanced-pitching-mix"); }
  // Pitcher styles — approach
  if (s === "lhp_strikeout" || s === "rhp_strikeout") { add("strikeout-staff"); add("solid-strikeout-staff"); }
  if (s === "lhp_contact"   || s === "rhp_contact")   { add("elite-pitching"); add("average-pitching"); }
  // Hitter styles
  if (s.indexOf("L_") === 0 || s.indexOf("S_") === 0) add("lefty-hitter-scarce");
  if (s.indexOf("_power") > -1) { add("power-hitting"); add("hitter-friendly-ERA"); }
  if (s.indexOf("_contact") > -1 && s.indexOf("lhp_") !== 0 && s.indexOf("rhp_") !== 0) { add("contact-hitting"); add("patient-lineup"); }

  // Speed tags
  if (a.speed === "very_fast")        { add("speed-first-offense"); add("balanced-speed"); }
  if (a.speed === "average_speed")    { add("balanced-speed"); add("station-to-station"); add("contact-hitting"); }
  if (a.speed === "not_a_baserunner") { add("station-to-station"); add("power-hitting"); }

  // Priority tags
  if (a.priority === "academics") add("academically-selective");

  return t;
}

function runMatch(a) {
  var desired = buildTags(a);
  var maxDrive = parseInt(a.drive, 10);
  var out = [];
  for (var i=0; i<SCHOOLS.length; i++) {
    var s = SCHOOLS[i];
    if (s.drive > maxDrive) continue;
    if (a.setting && a.setting !== "any" && SETTING[s.school] !== a.setting) continue;
    if (s.school === "University of Chicago") {
      if (a.academic !== "high" || a.act !== "high") continue;
    }
    if (a.act) {
      var actLo = ACT_LO[s.school];
      var playerAct = ACT_SCORE[a.act];
      if (actLo && playerAct !== undefined && (actLo - playerAct) >= 10) continue;
    }
    var matched = [];
    for (var j=0; j<s.tags.length; j++) {
      if (desired[s.tags[j]]) matched.push(s.tags[j]);
    }
    out.push({ school: s, score: matched.length, matched: matched });
  }
  out.sort(function(a,b){
    if (b.score !== a.score) return b.score - a.score;
    return a.school.era - b.school.era;
  });
  return out;
}

function pct(v) {
  if (v === null || v === undefined) return "N/A";
  return Math.round(v * 100) + "%";
}

function inFt(inches) {
  if (inches === null || inches === undefined) return null;
  var ft  = Math.floor(inches / 12);
  var inc = Math.round(inches % 12 * 10) / 10;
  return ft + "'" + (inc % 1 === 0 ? inc.toFixed(0) : inc.toFixed(1)) + '"';
}

// ── STEP LOGIC ───────────────────────────────────────────────────
function getStep() { return STEPS[state.stepIdx]; }

function resolveStep(step) {
  // Inject dynamic options/question for style step
  if (step.id === "style") {
    var src = (state.answers.position === "P") ? PITCHER_OPTS : HITTER_OPTS;
    return { id:step.id, key:step.key, cols:step.cols, label:step.label,
             question:src.question, hint:src.hint, options:src.options };
  }
  return step;
}

function shouldSkip(step) {
  return step.skipFn && step.skipFn(state.answers);
}

function totalVisible() {
  var n = 0;
  for (var i=0; i<STEPS.length; i++) if (!shouldSkip(STEPS[i])) n++;
  return n;
}

function visibleIndex() {
  var n = 0;
  for (var i=0; i<state.stepIdx; i++) if (!shouldSkip(STEPS[i])) n++;
  return n;
}

function advance() {
  state.stepIdx++;
  while (state.stepIdx < STEPS.length && shouldSkip(STEPS[state.stepIdx])) state.stepIdx++;
}

function retreat() {
  state.stepIdx--;
  while (state.stepIdx > 0 && shouldSkip(STEPS[state.stepIdx])) state.stepIdx--;
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  if (state.stepIdx >= STEPS.length) { showResults(); return; }

  var rawStep = getStep();
  if (shouldSkip(rawStep)) { advance(); render(); return; }

  var step = resolveStep(rawStep);
  var pct2 = ((visibleIndex() + 1) / (totalVisible() + 1)) * 100;
  document.getElementById("pf").style.width = pct2 + "%";

  var stepLabel = "Step " + (visibleIndex() + 1) + " of " + totalVisible();
  var sel = state.answers[step.key];
  var canNext = sel !== undefined && sel !== null;

  var opts = "";
  for (var i=0; i<step.options.length; i++) {
    var o = step.options[i];
    var isSel = (String(sel) === String(o.val));
    // Use data-key and data-val attributes — no quoting issues in onclick
    opts += "<button class='option-btn" + (isSel ? " selected" : "") + "' " +
            "data-key='" + step.key + "' data-val='" + o.val + "' onclick='pick(this)'>" +
            "<span class='label'>" + o.label + "</span></button>";
  }

  var backBtn = state.stepIdx > 0
    ? "<button class='btn btn-back' onclick='goBack()'>&#8592; Back</button>"
    : "";

  var html = "<div class='step-card'>" +
    "<div class='step-label'>" + stepLabel + "</div>" +
    "<div class='step-question'>" + step.question + "</div>" +
    "<div class='step-hint'>" + (step.hint || "") + "</div>" +
    "<div class='options" + (step.cols === 2 ? " two-col" : "") + "'>" + opts + "</div>" +
    "<div class='nav-row'>" + backBtn +
    "<button class='btn btn-next' onclick='goNext()' " + (canNext ? "" : "disabled") + ">" +
    (state.stepIdx < STEPS.length - 1 ? "Continue &#8594;" : "Find My Schools &#8594;") +
    "</button></div></div>";

  document.getElementById("app").innerHTML = html;
}

function pick(btn) {
  var key = btn.getAttribute("data-key");
  var val = btn.getAttribute("data-val");
  state.answers[key] = val;
  render();
}

function goNext() {
  var step = getStep();
  if (!state.answers[step.key] && state.answers[step.key] !== 0) return;
  advance();
  render();
}

function goBack() {
  retreat();
  render();
}

// ── SIZE CONTEXT ROW ─────────────────────────────────────────────
function buildSizeRow(school, pos) {
  if (!pos) return "";
  var sz = school.size && school.size[pos];
  var bk = BENCH[pos];
  if (!sz || !bk) return "";

  var parts = [];

  if (sz.h !== null) {
    var schoolHt = inFt(sz.h);
    var benchHt  = inFt(bk.h);
    var diff = sz.h - bk.h;
    var diffStr = diff === 0 ? "avg" : (diff > 0 ? "+" : "") + diff.toFixed(1) + '"';
    parts.push("<strong>" + schoolHt + "</strong> avg height <span class='size-vs'>(" + diffStr + " vs. 20-school avg " + benchHt + ")</span>");
  }

  if (sz.w !== null) {
    var schoolWt = Math.round(sz.w) + " lbs";
    var benchWt  = Math.round(bk.w) + " lbs";
    var diffW = Math.round(sz.w - bk.w);
    var diffWStr = diffW === 0 ? "avg" : (diffW > 0 ? "+" : "") + diffW + " lbs";
    parts.push("<strong>" + schoolWt + "</strong> avg weight <span class='size-vs'>(" + diffWStr + " vs. " + benchWt + ")</span>");
  }

  if (parts.length === 0) return "";

  var posLabel = {C:"Catchers",CI:"Corner INF",MI:"Middle INF",OF:"Outfielders",P:"Pitchers",UTL:"UTL players"}[pos] || pos;
  return "<div class='size-row'>" + posLabel + " here: " + parts.join(" &middot; ") + "</div>";
}

// ── FIT NARRATIVE ────────────────────────────────────────────────
function buildFitNarrative(s, result, answers, pos) {
  var sentences = [];
  var posLabels = {C:"catchers",CI:"corner infielders",MI:"middle infielders",OF:"outfielders",P:"pitchers",UTL:"utility players"};

  // 1. Position depth / opportunity
  if (pos === "P") {
    var hand = (answers.style && answers.style.indexOf("lhp_") === 0) ? "LHP" : "RHP";
    var handCount = (hand === "LHP") ? s.lhp : s.rhp;
    var opp = (hand === "LHP" && s.lhpPct < 0.20) ? "Left-handers are scarce here — a real opportunity for a LHP." :
              (hand === "LHP" && s.lhpPct > 0.35) ? "Already LHP-heavy — you'd compete for a spot in a crowded rotation." :
              (hand === "RHP" && s.lhpPct > 0.30) ? "The staff leans left-handed, so a RHP could fill a need." :
              "";
    sentences.push("There are " + handCount + " " + hand + "s among " + s.pitchers + " total pitchers." +
                   (opp ? " " + opp : ""));
  } else {
    var n = s.pos[pos] || 0;
    var lbl = posLabels[pos] || pos;
    if (n <= 2)      sentences.push("Only " + n + " " + lbl + " on the roster — that's a genuine opportunity for playing time.");
    else if (n <= 5) sentences.push("There are " + n + " " + lbl + " on roster — competitive for a spot but not a wall of depth.");
    else             sentences.push("Depth is significant at your position (" + n + " " + lbl + ") — you'd be competing hard to crack the lineup.");
  }

  // 2. Style / tag match quality
  var score = result.score;
  if (score >= 5)      sentences.push("Strong stylistic fit — " + score + " of your profile traits match what this program values.");
  else if (score >= 3) sentences.push("Solid overlap on " + score + " key traits with this program's identity.");
  else if (score >= 1) sentences.push(score + " trait" + (score > 1 ? "s" : "") + " align here — less of a natural fit, but worth exploring.");
  else                 sentences.push("Limited overlap with your profile — consider this a reach if you're set on your style.");

  // 3. Handedness fit for hitters
  if (pos !== "P" && answers.style) {
    var st = answers.style;
    var isLefty = (st.indexOf("L_") === 0 || st.indexOf("S_") === 0);
    if (isLefty && s.leftyBat !== null) {
      if (s.leftyBat < 0.20) sentences.push("Left-handed bats are rare here (" + pct(s.leftyBat) + " of lineup) — you'd stand out.");
      else if (s.leftyBat > 0.40) sentences.push("Lineups skew left-handed (" + pct(s.leftyBat) + ") — good fit for a lefty bat.");
    }
  }

  // 3. Academic fit (flag meaningful gaps using GPA + ACT)
  var actLo3  = ACT_LO[s.school];
  var playerAct3 = ACT_SCORE[answers.act];
  var actGap3 = (playerAct3 !== undefined && actLo3) ? actLo3 - playerAct3 : 0;

  if (actLo3 >= 33) {
    sentences.push("UChicago admits ACT " + s.acad.act + " (" + s.acad.accept + " acceptance rate) — a very high bar even for strong academic profiles.");
  } else if (actGap3 >= 5) {
    sentences.push("ACT gap worth noting — their typical admit scores " + s.acad.act + ".");
  } else if (answers.academic) {
    var acadLevel = s.acad.level;
    var playerGpa = answers.academic;
    if (acadLevel === "selective" && (playerGpa === "standard" || playerGpa === "lower")) {
      sentences.push("Academic bar is higher here (avg GPA " + s.acad.gpa + ", ACT " + s.acad.act + ") — coach advocacy is often key to admission.");
    } else if (acadLevel === "accessible" && playerGpa === "lower") {
      sentences.push("Open admissions environment (" + s.acad.accept + " accept rate) — academics won't be a barrier here.");
    }
  }

  return sentences.slice(0, 3).join(" ");
}

function buildClassTable(s) {
  var rows = ["C","CI","MI","OF","P","UTL"];

  for (var i = 0; i < rows.length; i++) {
    var p = rows[i];
    var d = s.posClass[p];
    if (!d) continue;

    html += "<tr><td>" + p + "</td><td>" + (d.FR||0) + "</td><td>" + (d.SO||0) + "</td><td>" + (d.JR||0) + "</td><td class='sr-col'>" + (d.SR||0) + "</td></tr>";
  }
  html += "</tbody></table>";
  return html;
}

// ── ACADEMIC FIT NOTE ────────────────────────────────────────────
function buildAcadFit(s, answers) {
  var gpa = answers.academic;
  var actKey = answers.act;
  if (!gpa && !actKey) return "<em>Answer the GPA and ACT questions to see your academic fit here.</em>";

  var actLo  = ACT_LO[s.school];
  var playerAct = ACT_SCORE[actKey];
  var actGap = (playerAct !== undefined && actLo) ? actLo - playerAct : 0;
  var level  = s.acad.level;
  var acadStr = s.acad.gpa + " GPA, ACT " + s.acad.act;

  // University of Chicago: ACT 34–36 is in a league of its own
  if (actLo >= 33) {
    if (actKey === "high")
      return "<strong>ACT likely below their range.</strong> UChicago\u2019s 25th-percentile ACT is 34 \u2014 a score of 30\u201332 still falls short of their typical admit. An exceptional academic profile and strong coach advocacy are both essential.";
    return "<strong>Significant academic reach.</strong> UChicago admits at " + s.acad.accept + " with ACT " + s.acad.act + ". This would require an extraordinary recruitment case.";
  }

  if (level === "selective") {
    if (actGap >= 5)
      return "<strong>ACT gap is a concern.</strong> Their typical admit scores ACT " + s.acad.act + ". The gap is significant \u2014 early coach contact and a strong overall application are important.";
    if (gpa === "high" && actGap <= 0)
      return "<strong>Strong academic fit.</strong> GPA and ACT are both within their admitted range (" + acadStr + ").";
    return "<strong>Borderline academic fit.</strong> Their typical profile is " + acadStr + ". Coach advocacy can make a real difference here.";
  }

  if (level === "moderate") {
    if (actGap >= 5)
      return "<strong>ACT may be below their typical range.</strong> Their admitted students generally score ACT " + s.acad.act + ". Worth raising with the coach early.";
    if (gpa === "high" || gpa === "mid")
      return "<strong>Comfortable academic fit.</strong> GPA and ACT align with their typical admitted student (" + acadStr + ").";
    if (gpa === "standard")
      return "<strong>Solid fit.</strong> You meet their standard (" + s.acad.gpa + " GPA). No major academic concerns here.";
    return "<strong>May need support.</strong> Their avg is " + s.acad.gpa + " GPA \u2014 talk to the coach early about academic pathways.";
  }

  // accessible
  if (gpa === "lower")
    return "<strong>Accessible program.</strong> With a " + s.acad.accept + " acceptance rate, this school has an open admissions philosophy \u2014 academics are not a barrier.";
  return "<strong>Comfortable academic fit.</strong> Broad acceptance (" + s.acad.accept + " rate) \u2014 you\u2019re well within their typical admitted range.";
}

// ── RESULTS ──────────────────────────────────────────────────────
function showResults() {
  document.getElementById("pf").style.width = "100%";
  var results = runMatch(state.answers);
  var pos = state.answers.position;
  var topScore = results.length ? results[0].score : 0;

  var cards = "";
  for (var i=0; i<results.length; i++) {
    var r = results[i];
    var s = r.school;
    var isTop = (i === 0 && r.score === topScore && r.score > 0);

    // All tags — matched highlighted navy, unmatched dimmed
    var matchedSet = {};
    for (var j=0; j<r.matched.length; j++) matchedSet[r.matched[j]] = true;
    var tagsHtml = "";
    for (var j=0; j<s.tags.length; j++) {
      var tag = s.tags[j];
      var cls = matchedSet[tag] ? "tag-match" : "tag-dim";
      tagsHtml += "<span class='tag " + cls + "'>" + tl(tag) + "</span>";
    }
    if (s.xfer > 0)
      tagsHtml += "<span class='tag tag-opportunity'>" + pct(s.xfer) + " transfers</span>";

    // Depth row — always show pitcher breakdown + hitter position breakdown
    var pitcherChips =
      "<div class='depth-chip'><strong>" + s.pitchers + "</strong> pitchers total</div>" +
      "<div class='depth-chip'><strong>" + s.lhp + "</strong> LHP &middot; <strong>" + s.rhp + "</strong> RHP</div>";
    var hposOrder = ["C","CI","MI","OF","UTL"];
    var hparts = [];
    for (var k=0; k<hposOrder.length; k++) {
      var hp = hposOrder[k];
      hparts.push("<strong>" + (s.pos[hp] || 0) + "</strong> " + hp);
    }
    var hitterChip = "<div class='depth-chip'>" + hparts.join(" &middot; ") + "</div>";
    var depthHtml = pitcherChips + hitterChip;

    cards += "<div class='school-card" + (isTop ? " top-match" : "") + "'>" +
      (isTop ? "<div class='top-banner'>Best match</div>" : "") +
      "<div class='school-card-header'>" +
        "<div><div class='school-name'>" + s.school + "</div>" +
        "<div class='school-meta'>" + s.city + " &middot; " + s.conf + "</div></div>" +
        "<div class='match-score'><div class='num'>" + r.score + "</div><div class='lbl'>match pts</div></div>" +
      "</div>" +
      "<div class='school-stats'>" +
        "<div class='stat-row'>" +
          "<div class='stat-row-label'>Hitting</div>" +
          "<div class='stat-cell'><div class='stat-val'>." + Math.round(s.avg * 1000) + "</div><div class='stat-lbl'>AVG</div></div>" +
          "<div class='stat-cell'><div class='stat-val'>" + s.hr + "</div><div class='stat-lbl'>HR</div></div>" +
          "<div class='stat-cell'><div class='stat-val'>" + s.sb + "</div><div class='stat-lbl'>SB</div></div>" +
        "</div>" +
        "<div class='stat-row'>" +
          "<div class='stat-row-label'>Pitching</div>" +
          "<div class='stat-cell'><div class='stat-val'>" + s.era.toFixed(2) + "</div><div class='stat-lbl'>ERA</div></div>" +
          "<div class='stat-cell'><div class='stat-val'>" + s.so + "</div><div class='stat-lbl'>Staff K</div></div>" +
          "<div class='stat-cell'><div class='stat-val'>" + s.bb + "</div><div class='stat-lbl'>Staff BB</div></div>" +
        "</div>" +
      "</div>" +
      "<div class='fit-section'><div class='fit-label'>How do I fit?</div><div class='fit-text'>" + buildFitNarrative(s, r, state.answers, pos) + "</div></div>" +
      "<details class='card-details'><summary>Academics</summary>" +
        "<div class='acad-grid'>" +
          "<div class='acad-cell'><div class='acad-val'>" + s.acad.gpa + "</div><div class='acad-lbl'>Avg GPA</div></div>" +
          "<div class='acad-cell'><div class='acad-val'>" + s.acad.act + "</div><div class='acad-lbl'>ACT mid-50%</div></div>" +
          "<div class='acad-cell'><div class='acad-val'>" + s.acad.accept + "</div><div class='acad-lbl'>Accept rate</div></div>" +
        "</div>" +
        "<div class='acad-fit'>" + buildAcadFit(s, state.answers) + "</div>" +
      "</details>" +
      "<details class='card-details'><summary>Program Profile</summary>" +
      buildSizeRow(s, pos) +
      "<div class='school-tags'>" + tagsHtml + "</div>" +
      "</details>" +
      "<details class='card-details'><summary>Roster Breakdown</summary>" +
      "<div class='depth-row'>" + depthHtml + "</div>" +
      buildClassTable(s) +
      "</details>" +
      "<div class='coach-row'>" +
        "<div class='coach-info'>" +
          "<div class='coach-name'>" + s.coach.name + "</div>" +
          "<div class='coach-sub'>" + s.coach.title + "</div>" +
        "</div>" +
        (s.coach.email
          ? "<a href='mailto:" + s.coach.email + "' class='coach-contact'>Email coach &#8594;</a>"
          : "<a href='" + s.coach.coachUrl + "' target='_blank' class='coach-contact'>Contact &#8594;</a>") +
      "</div>" +
      "<div class='school-footer'>" +
        "<a href='" + s.url + "' target='_blank' class='roster-link'>View roster &#8594;</a>" +
        "<span class='drive-badge'>" + s.drive + " min from Naperville</span>" +
      "</div></div>";
  }

  var summary = buildSummary(state.answers);

  document.getElementById("app").innerHTML =
    "<div class='results-header'><h2>Your Matches</h2><p>" + summary + "</p></div>" +
    cards +
    "<div class='action-row'><button class='btn-restart' onclick='restart()'>Start over</button><button class='btn-share' onclick='copyLink(this)'>Share results</button></div>";
}

function buildSummary(a) {
  var posL = {C:"Catcher",CI:"Corner INF",MI:"Middle INF",OF:"Outfield",P:"Pitcher",UTL:"Multi-pos"};
  var spdL = {very_fast:"fast runner",average_speed:"avg speed",not_a_baserunner:"power bat"};
  var styL = {lhp_strikeout:"LHP strikeout",lhp_contact:"LHP contact",
              rhp_strikeout:"RHP strikeout",rhp_contact:"RHP contact",
              L_power:"LH power",L_contact:"LH contact",R_power:"RH power",R_contact:"RH contact",S_any:"Switch"};
  var parts = [];
  if (a.position) parts.push(posL[a.position] || a.position);
  if (a.style)    parts.push(styL[a.style] || a.style);
  if (a.speed)    parts.push(spdL[a.speed] || a.speed);
  if (a.drive)    parts.push(a.drive === "0" ? "city only" : "max " + a.drive + " min");
  return parts.join(" &middot; ");
}

function restart() {
  state = { stepIdx:0, answers:{} };
  // Clear URL params without reloading
  if (window.history && window.history.replaceState) {
    window.history.replaceState(null, "", window.location.pathname);
  }
  render();
}

// ── SHARE LINK ───────────────────────────────────────────────────
function copyLink(btn) {
  var a = state.answers;
  var params = [];
  var keys = ["position","style","speed","drive","setting","academic","act","priority"];
  for (var i=0; i<keys.length; i++) {
    if (a[keys[i]] !== undefined && a[keys[i]] !== null) {
      params.push(encodeURIComponent(keys[i]) + "=" + encodeURIComponent(a[keys[i]]));
    }
  }
  var url = window.location.pathname + (params.length ? "?" + params.join("&") : "");
  var full = window.location.origin + url;

  // Copy to clipboard
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(full).then(function() { flashShare(btn); });
  } else {
    // Fallback for browsers without clipboard API
    var ta = document.createElement("textarea");
    ta.value = full;
    ta.style.position = "fixed"; ta.style.top = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(ta);
    flashShare(btn);
  }
}

function flashShare(btn) {
  btn.textContent = "Copied!";
  btn.classList.add("copied");
  setTimeout(function() {
    btn.innerHTML = "Share results";
    btn.classList.remove("copied");
  }, 2200);
}

// ── INIT ─────────────────────────────────────────────────────────
// Check for shared link params
(function() {
  var search = window.location.search;
  if (search && search.indexOf("position=") > -1) {
    var pairs = search.slice(1).split("&");
    var loaded = {};
    for (var i=0; i<pairs.length; i++) {
      var kv = pairs[i].split("=");
      if (kv.length === 2) {
        loaded[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
      }
    }
    if (loaded.position) {
      state.answers = loaded;
      state.stepIdx = STEPS.length; // jump straight to results
      showResults();
      return;
    }
  }
  render();
})();
</script>
